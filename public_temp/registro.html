<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>RetroGame - Registro</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Crear Cuenta</h2>
      <form id="registerForm">
        <input
          type="text"
          name="usuario"
          placeholder="Nombre de usuario"
          required
        />
        <input
          type="email"
          name="email"
          placeholder="Correo electrónico"
          required
        />
        <input
          type="password"
          name="password"
          placeholder="Contraseña"
          required
        />
        <button type="submit">Registrarse</button>
      </form>
      <a href="login.html">Ya tengo cuenta</a>
    </div>
    <script src="js/auth.js"></script>
  </body>
</html>
